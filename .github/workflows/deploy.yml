name: Deploy python-flask to EC2

on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:
  provision:
    name: Provision EC2
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.get_ip.outputs.server_ip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Write SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Restore default VPC if missing
        run: |
          VPC_ID=$(aws ec2 describe-vpcs --filters Name=isDefault,Values=true --query 'Vpcs[0].VpcId' --output text 2>/dev/null || echo "None")
          if [ "$VPC_ID" = "None" ] || [ -z "$VPC_ID" ]; then
            echo "No default VPC found. Creating one..."
            aws ec2 create-default-vpc
          else
            echo "Default VPC exists: $VPC_ID"
          fi

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="project_name=${{ secrets.PROJECT_NAME }}"

      - name: Get server IP
        id: get_ip
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw instance_public_ip)
          echo "server_ip=$SERVER_IP" >> $GITHUB_OUTPUT

  configure:
    name: Configure and Deploy
    runs-on: ubuntu-latest
    needs: provision
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          pip install ansible

      - name: Write SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Wait for SSH
        env:
          SERVER_IP: ${{ needs.provision.outputs.server_ip }}
        run: |
          for i in $(seq 1 30); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i /tmp/deploy_key ubuntu@$SERVER_IP echo ok && break || sleep 10
          done

      - name: Run Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          SERVER_IP: ${{ needs.provision.outputs.server_ip }}
        run: |
          ansible-playbook -i "$SERVER_IP," \
            --private-key /tmp/deploy_key \
            -u ubuntu \
            -e "project_name=${{ secrets.PROJECT_NAME }}" \
            -e "app_port=3000" \
            -e "python_version=3.11" \
            -e "app_repo=${{ github.repositoryUrl }}" \
            -e "app_branch=${{ github.ref_name }}" \
            -e "database_url='${{ secrets.DATABASE_URL }}'" \
            -e "mongo_uri='${{ secrets.MONGO_URI }}'" \
            -e "db_host='${{ secrets.DB_HOST }}'" \
            -e "db_port='${{ secrets.DB_PORT }}'" \
            -e "db_name='${{ secrets.DB_NAME }}'" \
            -e "db_user='${{ secrets.DB_USER }}'" \
            -e "db_user='${{ secrets.DB_USER }}'" \
            -e "db_username='${{ secrets.DB_USERNAME }}'" \
            -e "db_password='${{ secrets.DB_PASSWORD }}'" \
            -e "db_password_plain='${{ secrets.DB_PASSWORD }}'" \
            -e "install_db='${{ secrets.INSTALL_DB_ON_EC2 }}'" \
            -e "db_type='${{ secrets.DB_TYPE }}'" \
            ansible/playbook.yml

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [provision, configure]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          pip install ansible

      - name: Write SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Verify application
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          SERVER_IP: ${{ needs.provision.outputs.server_ip }}
        run: |
          ansible-playbook -i "$SERVER_IP," \
            --private-key /tmp/deploy_key \
            -u ubuntu \
            ansible/verify.yml

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [provision, verify]
    if: always()
    steps:
      - name: Notify success
        if: ${{ needs.verify.result == 'success' }}
        run: |
          echo "Deployment succeeded. App is live at http://${{ needs.provision.outputs.server_ip }}"

      - name: Notify failure
        if: ${{ needs.verify.result != 'success' }}
        run: |
          echo "Deployment failed. Please check the logs."
          exit 1