---
- name: Verify Deployment
  hosts: all
  become: yes
  gather_facts: no

  tasks:
    - name: Wait for application to respond
      uri:
        url: "http://localhost:80"
        status_code: 200
        timeout: 10
      retries: 6
      delay: 10
      register: health_check
      until: health_check.status == 200